<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{font-size:18px;}
body{font-family:'DM Sans',sans-serif;background:#F5F3EF;color:#1A1A1A;min-height:100vh;}
.app{max-width:600px;margin:0 auto;padding:24px 18px 120px;}
h1{font-size:1.6rem;font-weight:700;margin-bottom:2px;}
.sub{font-size:0.8rem;color:#999;margin-bottom:20px;}
.nav{display:flex;gap:8px;margin-bottom:22px;flex-wrap:wrap;}
.nav button{padding:11px 16px;border-radius:24px;border:2px solid #DDD;background:white;cursor:pointer;font-size:0.85rem;font-family:'DM Sans',sans-serif;color:#555;font-weight:600;-webkit-appearance:none;}
.nav button.active{background:#1A1A1A;color:white;border-color:#1A1A1A;}
.screen{display:none;}.screen.active{display:block;}
.stitle{font-size:0.7rem;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;margin-top:22px;}
.card{background:white;border-radius:16px;border:1px solid #EEE;padding:18px;margin-bottom:12px;}
.track{width:100%;height:7px;background:#F0F0F0;border-radius:4px;margin-top:8px;overflow:hidden;}
.fill{height:100%;border-radius:4px;}
.fill.red{background:#E74C3C;}.fill.amber{background:#F39C12;}.fill.green{background:#2ECC71;}.fill.blue{background:#3498DB;}.fill.purple{background:#8E44AD;}
.alerta{border-radius:14px;padding:15px 18px;font-size:0.85rem;margin-bottom:14px;line-height:1.6;}
.alerta.warn{background:#FEF9E7;color:#7D6608;border:1px solid #F9E79F;}
.alerta.good{background:#EAFAF1;color:#1D6A3E;border:1px solid #A9DFBF;}
.alerta.info{background:#EBF5FB;color:#1A5276;border:1px solid #AED6F1;}
.alerta.danger{background:#FADBD8;color:#922B21;border:1px solid #F1948A;}
.grow{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;background:white;border-radius:14px;border:1px solid #EEE;margin-bottom:8px;}
.gcat{color:#999;font-size:0.75rem;margin-top:3px;}
.tabs{display:flex;margin-bottom:20px;background:white;border-radius:16px;border:1px solid #EEE;overflow:hidden;}
.tabs button{flex:1;padding:16px;border:none;background:white;font-size:0.82rem;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;color:#888;-webkit-appearance:none;}
.tabs button.at{background:#1A1A1A;color:white;}
.tabs button.ati{background:#27AE60;color:white;}
.tabs button.atd{background:#C0392B;color:white;}
.manual-box{background:white;border-radius:16px;border:1px solid #EEE;padding:18px;margin-bottom:14px;}
.mrow{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;}
.mrow input,.mrow select{flex:1;min-width:120px;padding:14px;border-radius:12px;border:2px solid #EEE;font-size:0.95rem;font-family:'DM Sans',sans-serif;color:#1A1A1A;background:white;-webkit-appearance:none;}
.sel-full{width:100%;padding:14px;border-radius:12px;border:2px solid #EEE;font-size:0.95rem;font-family:'DM Sans',sans-serif;margin-bottom:10px;background:white;color:#1A1A1A;-webkit-appearance:none;}
.sbtn{width:100%;padding:16px;border-radius:14px;border:none;background:#1A1A1A;color:white;font-size:1rem;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:4px;-webkit-appearance:none;}
.sbtn.ing{background:#27AE60;}.sbtn.tar{background:#8E44AD;}.sbtn.red{background:#C0392B;}.sbtn:active{opacity:0.85;}
.month-nav{display:flex;align-items:center;justify-content:space-between;background:white;border-radius:16px;border:1px solid #EEE;padding:14px 20px;margin-bottom:18px;}
.month-nav button{background:none;border:none;font-size:1.6rem;cursor:pointer;color:#555;padding:4px 12px;}
.month-label{font-size:1rem;font-weight:700;}
.cta-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:18px;}
.cta{background:white;border-radius:14px;border:1px solid #EEE;padding:16px;}
.cbanco{font-size:0.65rem;color:#AAA;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px;font-weight:600;}
.ctipo{font-size:0.85rem;font-weight:700;color:#333;margin-bottom:6px;}
.csaldo{font-size:1.1rem;font-weight:700;}
.cedit{font-size:0.75rem;color:#3498DB;cursor:pointer;display:inline-block;margin-top:6px;font-weight:600;}
.ok-msg{background:#EAFAF1;color:#1D6A3E;border:1px solid #A9DFBF;border-radius:14px;padding:14px 16px;font-size:0.85rem;margin-top:10px;}
.loading{text-align:center;padding:40px;color:#999;font-size:0.9rem;}
.tar-card{background:white;border-radius:16px;border:2px solid #EEE;padding:20px;margin-bottom:14px;}
.cuota-row{display:flex;justify-content:space-between;padding:10px 14px;background:#F5F3EF;border-radius:10px;margin-bottom:6px;font-size:0.85rem;}
.meta-card{background:white;border-radius:16px;border:2px solid #EEE;padding:18px;margin-bottom:12px;}
.meta-num{background:#1A1A1A;color:white;border-radius:50%;width:26px;height:26px;display:inline-flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:700;flex-shrink:0;}
</style>

  <div class="screen" id="s-tarjetas">
    <div class="month-nav">

</div>

async function sb(table, method='GET', body=null, query=''){
  const res = await fetch(`${SB_URL}/rest/v1/${table}${query}`, {
    method,
    headers:{
      'apikey': SB_KEY,
      'Authorization': 'Bearer '+SB_KEY,
      'Content-Type': 'application/json',
      'Prefer': method==='POST'?'return=representation':''
    },
    body: body ? JSON.stringify(body) : null
  });
  if(!res.ok) throw new Error(await res.text());
  if(method==='DELETE') return {ok:true};
  const txt = await res.text();
  return txt ? JSON.parse(txt) : {ok:true};
}

const MESES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const PRES={'Alimentacion':600000,'Familia':400000,'Estilo de vida':300000,'Servicios':200000,'Hogar':100000,'Vivienda':100000,'Personal':80000,'Salud':60000,'Mantenciones':50000,'Imprevistos':100000,'Contribucion':83333};
const TOTAL_PRES=2073333;
const CONTRIB=83333;
const CONTRIB_T=250000;

let mes=new Date().getMonth()+1, anio=new Date().getFullYear(), cache=null;
function fmt(n){return Math.round(n).toLocaleString('es-CL');}

function show(id,btn){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('s-'+id).classList.add('active');
  btn.classList.add('active');
  if(['resumen','tarjetas','cuentas'].includes(id))cargar();
  if(id==='metas')rMetas();
  if(id==='deudas')rDeudas();
}

function switchTab(t){
  ['gasto','ingreso','deuda'].forEach(x=>document.getElementById('panel-'+x).style.display=t===x?'block':'none');
  document.getElementById('tab-g').className=t==='gasto'?'at':'';
  document.getElementById('tab-i').className=t==='ingreso'?'ati':'';
  document.getElementById('tab-d').className=t==='deuda'?'atd':'';
}

function cambiarMes(d){
  mes+=d;if(mes>12){mes=1;anio++;}if(mes<1){mes=12;anio--;}
  labels();cache=null;cargar();
}

function labels(){
  const l=MESES[mes-1]+' '+anio;
  ['mes-label','resumen-mes','tarjetas-mes'].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent=l;});
}

async function cargar(){
  if(cache){rAll(cache);return;}
  try{
    const [gastos,ingresos,pagos,cuentas,gastosAnt,ingresosAnt]=await Promise.all([
      sb('gastos','GET',null,`?mes=eq.${mes}&anno=eq.${anio}&order=id.asc`),
      sb('ingresos','GET',null,`?mes=eq.${mes}&anno=eq.${anio}&order=id.asc`),
      sb('pagos_tarjeta','GET',null,`?mes=eq.${mes}&anno=eq.${anio}`),
      sb('cuentas','GET',null,'?order=id.asc'),
      sb('gastos','GET',null,`?mes=eq.${mes===1?12:mes-1}&anno=eq.${mes===1?anio-1:anio}&select=categoria,monto`),
      sb('ingresos','GET',null,`?mes=eq.${mes===1?12:mes-1}&anno=eq.${mes===1?anio-1:anio}&select=monto`)
    ]);
    const d={
      gastos: gastos.map((r,i)=>({idx:i,id:r.id,fecha:r.fecha,det:r.detalle,cat:r.categoria,monto:Number(r.monto),quien:r.quien,tarjeta:r.tarjeta})),
      ingresos: ingresos.map((r,i)=>({idx:i,id:r.id,fecha:r.fecha,det:r.detalle,tipo:r.tipo,monto:Number(r.monto),quien:r.quien})),
      pagosTarjeta: pagos.map(r=>({fecha:r.fecha,tarjeta:r.tarjeta,monto:Number(r.monto)})),
      cuentas: cuentas.map(r=>({cuenta:r.cuenta,saldo:Number(r.saldo),actualizado:r.actualizado})),
      gastosAnt: gastosAnt.map(r=>({cat:r.categoria,monto:Number(r.monto)})),
      ingresosAnt: ingresosAnt.map(r=>({monto:Number(r.monto)}))
    };
    cache=d;rAll(d);
  } catch(e){
    document.getElementById('resumen-content').innerHTML=`<div class="alerta danger">Error: ${e.message}</div>`;
  }
}

function gs(cts,n){const c=cts.find(x=>x.cuenta===n);return c?Number(c.saldo):0;}
function rAll(d){rResumen(d);rTarjetas(d);rCuentas(d);}

function rResumen(d){
  const gastosPres=d.gastos.filter(g=>g.cat!=='Pago Deuda');
  const tG=gastosPres.reduce((a,g)=>a+g.monto,0);
  const tI=d.ingresos.reduce((a,g)=>a+g.monto,0);
  const tGant=d.gastosAnt.filter(g=>g.cat!=='Pago Deuda').reduce((a,g)=>a+g.monto,0);
  const tIant=d.ingresosAnt.reduce((a,g)=>a+g.monto,0);
  const cts=d.cuentas;
  const dY=d.gastos.filter(g=>g.tarjeta==='Debito Yurby').reduce((a,g)=>a+g.monto,0);
  const dJ=d.gastos.filter(g=>g.tarjeta==='Debito Juan').reduce((a,g)=>a+g.monto,0);
  const ef=d.gastos.filter(g=>g.tarjeta==='Efectivo').reduce((a,g)=>a+g.monto,0);
  const sY=gs(cts,'Debito Yurby'),sJ=gs(cts,'Debito Juan'),sE=gs(cts,'Efectivo');
  const totalCuentas=Math.max(0,sY-dY)+Math.max(0,sJ-dJ)+Math.max(0,sE-ef);
  const diffG=tGant>0?Math.round((tG-tGant)/tGant*100):0;
  const pctPres=Math.round(tG/TOTAL_PRES*100);
  let h='';

function rMetas(){
  const metas=getMetas();
  const vars=getVars();
  const totalHoy=13991786,FONDO=7214593;
  const dispMetas=Math.max(0,totalHoy-FONDO);
  function simular(meta,yaDisp){
    let acum=yaDisp||0;
    if(acum>=meta)return{label:'Ya lo tienes',color:'#27AE60',año:2026};
    let mA=4,aA=2026,tot=0;
    while(tot<300){
      mA++;tot++;if(mA>12){mA=1;aA++;}
      let ah=0;
      if(aA===2026&&mA>=7&&mA<=9)ah=285000;
      else if((aA===2026&&mA>=10)||(aA===2027&&mA<=3))ah=1289000;
      else ah=2827500;
      acum+=ah;
      if(mA===1&&aA>2026)acum+=vars.utilidades;
      if(mA===6)acum+=vars.bono1;
      if(mA===12)acum+=vars.bono2;
      if(acum>=meta)return{label:MESES[mA-1]+' '+aA,color:aA<=2027?'#27AE60':aA<=2030?'#E67E22':'#C0392B',año:aA};
    }
    return{label:'Mas de 20 años',color:'#999',año:9999};
  }
  const activas=metas.filter(m=>!m.cumplida).sort((a,b)=>a.orden-b.orden);
  const cumplidas=metas.filter(m=>m.cumplida);
  let h=`<div style="background:white;border-radius:16px;border:1px solid #EEE;padding:18px;margin-bottom:18px;">
    <div style="font-weight:700;margin-bottom:12px;font-size:0.9rem;">Capacidad de ahorro por etapa</div>

      <div style="display:flex;justify-content:space-between;padding:10px 14px;background:#FEF9E7;border-radius:10px;"><span>Jul — Sep 2026</span><span style="font-weight:700;color:#E67E22;">$285.000/mes</span></div>
      <div style="display:flex;justify-content:space-between;padding:10px 14px;background:#FEF9E7;border-radius:10px;"><span>Oct 2026 — Mar 2027</span><span style="font-weight:700;color:#E67E22;">$1.289.000/mes</span></div>
      <div style="display:flex;justify-content:space-between;padding:10px 14px;background:#EAFAF1;border-radius:10px;"><span>Abril 2027 en adelante</span><span style="font-weight:700;color:#27AE60;">$2.827.500/mes</span></div>
    </div>
  </div>`;
  h+=`<div class="stitle">Metas</div>`;
  activas.forEach((m,idx)=>{
    const disp=idx===0?dispMetas:0;
    const sim=simular(m.meta,disp);
    const pct=Math.min(100,Math.round(disp/m.meta*100));
    h+=`<div class="meta-card" style="border-color:${sim.año<=2027?'#27AE60':sim.año<=2030?'#E67E22':'#EEE'};">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;">
        <div style="display:flex;align-items:center;gap:8px;"><span class="meta-num">${idx+1}</span><span style="font-weight:700;">${m.emoji} ${m.label}</span></div>
        <div style="display:flex;gap:8px;flex-shrink:0;"><span class="cedit" onclick="editMeta('${m.id}')">Editar</span><span class="cedit" style="color:#27AE60;" onclick="marcarCumplida('${m.id}')">✓</span></div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;text-align:center;">
        <div style="background:#F5F3EF;border-radius:10px;padding:10px;"><div class="gcat">Meta</div><div style="font-weight:700;font-size:0.85rem;">$${fmt(m.meta)}</div></div>
        <div style="background:${disp>0?'#EAFAF1':'#F5F3EF'};border-radius:10px;padding:10px;"><div class="gcat">Disponible</div><div style="font-weight:700;font-size:0.85rem;color:${disp>0?'#27AE60':'#999'};">${disp>0?'$'+fmt(disp):'$0'}</div></div>
        <div style="background:${sim.año<=2027?'#EAFAF1':sim.año<=2030?'#FEF9E7':'#F5F3EF'};border-radius:10px;padding:10px;"><div class="gcat">Lo logras</div><div style="font-weight:700;font-size:0.85rem;color:${sim.color};">${sim.label}</div></div>
      </div>
    </div>`;
  });
  h+=`<button class="sbtn ing" style="margin-bottom:16px;" onclick="nuevaMeta()">+ Agregar meta</button>`;
  if(cumplidas.length){
    h+=`<div class="stitle">Cumplidas</div>`;

  try{pagosDeuda=await sb('gastos','GET',null,);}catch(e){}
  let h=`<div style="background:white;border-radius:16px;border:2px solid #1A1A1A;padding:18px;margin-bottom:16px;display:grid;grid-template-columns:repeat(2,1fr);gap:12px;">
    <div><div class="gcat">Cuotas/mes</div><div style="font-size:1.3rem;font-weight:700;color:#C0392B;">$${fmt(total)}</div></div>
    <div><div class="gcat">Deudas activas</div><div style="font-size:1.3rem;font-weight:700;">${fijas.length+extra.length}</div></div>
  </div>`;
  h+=`<div class="stitle">Deudas bancarias</div>`;
  fijas.forEach(d=>{
    // Buscar pagos de esta deuda
    const pagos=pagosDeuda.filter(p=>p.detalle&&p.detalle.includes(d.nombre));
    const totalPagado=pagos.reduce((a,p)=>a+Number(p.monto),0);
    const cuotasPagadas=pagos.length;
    const pctReal=d.total>0?Math.min(100,Math.round(totalPagado/d.total*100)):d.prog;
    h+=`<div class="card">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
        <span style="font-weight:700;">${d.nombre}</span>
        <span style="font-weight:700;color:#C0392B;">$${fmt(d.cuota)}/mes</span>
      </div>
      <div class="gcat" style="margin-bottom:8px;">Total: $${fmt(d.total)} · Fin: ${d.fin}</div>
      ${cuotasPagadas>0?`<div style="background:#EAFAF1;border-radius:10px;padding:10px 14px;margin-bottom:8px;font-size:0.85rem;">
        <div style="font-weight:700;color:#27AE60;">${cuotasPagadas} cuota${cuotasPagadas>1?'s':''} pagada${cuotasPagadas>1?'s':''} — Total: $${fmt(totalPagado)}</div>
        <div style="color:#999;margin-top:2px;">Ultimo pago: ${pagos[0].fecha}</div>
      </div>`:''}
      <div style="display:flex;justify-content:space-between;font-size:0.75rem;color:#999;margin-bottom:4px;">
        <span>Avance</span><span style="font-weight:700;color:${pctReal>50?'#27AE60':'#E67E22'}">${pctReal}%</span>
      </div>
      <div class="track"><div class="fill ${d.color}" style="width:${pctReal}%"></div></div>
    </div>`;
  });
  h+=`<div class="alerta info">Deuda pasaje Venezuela y saldo Falabella se gestionan en Tarjetas.</div>`;
  if(extra.length){
    h+=`<div class="stitle">Deudas agregadas</div>`;
    extra.forEach((d,i)=>{
      const pagos=pagosDeuda.filter(p=>p.detalle&&p.detalle.includes(d.nombre));
      const totalPagado=pagos.reduce((a,p)=>a+Number(p.monto),0);
      h+=`<div class="card">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px;"><span style="font-weight:700;">${d.nombre}</span><span style="font-weight:700;color:#C0392B;">$${fmt(d.cuota)}/mes</span></div>
        <div class="gcat">$${fmt(d.total)} · Fin: ${d.fin}</div>
        ${totalPagado>0?`<div style="color:#27AE60;font-size:0.85rem;margin-top:6px;font-weight:700;">Pagado: $${fmt(totalPagado)}</div>`:''}
        <div style="display:flex;gap:8px;margin-top:8px;"><span class="cedit" onclick="editDeuda(${i})">Editar</span><span class="cedit" style="color:#C0392B;" onclick="eliminarDeuda(${i})">Eliminar</span></div>
      </div>`;
    });
  }
  // Historial de pagos
  if(pagosDeuda.length>0){
    h+=`<div class="stitle">Historial de pagos de deuda</div>`;
    pagosDeuda.slice(0,10).forEach(p=>{
      h+=`<div class="grow"><div><div style="font-weight:700;">${p.detalle.replace('Pago deuda: ','')}</div><div class="gcat">${p.fecha} · ${p.tarjeta}</div></div><span style="font-weight:700;color:#C0392B;">$${fmt(p.monto)}</span></div>`;
    });
  }
  document.getElementById('deudas-content').innerHTML=h;
}

function fmtFechaInput(fi){
  if(fi){const p=fi.split('-');return`${p[2]}/${p[1]}/${p[0]}`;}
  const h=new Date();return`${String(h.getDate()).padStart(2,'0')}/${String(h.getMonth()+1).padStart(2,'0')}/${h.getFullYear()}`;
}

async function actualizarCuenta(nombre, delta){
  const existing=await sb('cuentas','GET',null,`?cuenta=eq.${encodeURIComponent(nombre)}`);
  if(existing.length>0){
    const nuevoSaldo=Math.max(0,Number(existing[0].saldo)+delta);
    await sb('cuentas','PATCH',{saldo:nuevoSaldo,actualizado:fmtFechaInput('')},`?cuenta=eq.${encodeURIComponent(nombre)}`);
  } else {
    await sb('cuentas','POST',{cuenta:nombre,saldo:Math.max(0,delta),actualizado:fmtFechaInput('')});
  }
}

async function guardarG(){
  const det=document.getElementById('q-det').value.trim();
  const monto=parseInt(document.getElementById('q-monto').value)||0;
  if(!det||!monto){alert('Escribe el detalle y el monto');return;}
  const cat=document.getElementById('q-cat').value;
  const quien=document.getElementById('q-quien').value;
  const tar=document.getElementById('q-tar').value;
  const fi=document.getElementById('q-fecha').value;
  const fecha=fmtFechaInput(fi);
  const partes=fecha.split('/');
  const mG=parseInt(partes[1]),aG=parseInt(partes[2]);
  document.getElementById('ok-g').innerHTML=`<div class="ok-msg">Guardando...</div>`;
  try{
    await sb('gastos','POST',{fecha,detalle:det,categoria:cat,monto,quien,tarjeta:tar,mes:mG,anno:aG});
    // Mover dinero entre cuentas segun logica
    if(cat==='Contribucion' && (tar==='Debito Yurby'||tar==='Debito Juan')){
      // Abono mensual: sale de debito y entra al RUT
      await actualizarCuenta('RUT Yurby (Contribucion)', monto);
    } else if(tar==='RUT Yurby (Contribucion)'){
      // Pago trimestral real con RUT - no hace nada extra, ya se descuenta del RUT en pantalla
    }
    document.getElementById('q-det').value='';document.getElementById('q-monto').value='';
    document.getElementById('ok-g').innerHTML=`<div class="ok-msg">Guardado: $${fmt(monto)} — ${det}</div>`;
    setTimeout(()=>{document.getElementById('ok-g').innerHTML='';},3000);
    cache=null;if(mG===mes&&aG===anio)cargar();
  }catch(e){document.getElementById('ok-g').innerHTML=`<div class="alerta danger">Error: ${e.message}</div>`;}
}

async function guardarI(){
  const det=document.getElementById('qi-det').value.trim();
  const monto=parseInt(document.getElementById('qi-monto').value)||0;
  if(!det||!monto){alert('Escribe el detalle y el monto');return;}
  const fi=document.getElementById('qi-fecha').value;
  const fecha=fmtFechaInput(fi);
  const partes=fecha.split('/');
  const quien=document.getElementById('qi-quien').value;
  const mesI=parseInt(partes[1]),anioI=parseInt(partes[2]);
  // Solo sumar a cuenta si es mes actual o futuro (no abril 2026 que ya tiene saldo inicial)
  const esActual=(mesI===mes&&anioI===anio);
  const esFuturo=(anioI>anio)||(anioI===anio&&mesI>mes);
  document.getElementById('ok-i').innerHTML=`<div class="ok-msg">Guardando...</div>`;
  try{
    const cuentaNomI=document.getElementById('qi-cuenta').value;
    await sb('ingresos','POST',{fecha,detalle:det,tipo:document.getElementById('qi-tipo').value,monto,quien,cuenta:cuentaNomI,mes:mesI,anno:anioI});
    // Sumar a la cuenta seleccionada
    const cuentaNom=document.getElementById('qi-cuenta').value;
    await actualizarCuenta(cuentaNom, monto);
    document.getElementById('qi-det').value='';document.getElementById('qi-monto').value='';
    document.getElementById('ok-i').innerHTML=`<div class="ok-msg">Guardado: +$${fmt(monto)} — ${det} (sumado a cuenta)</div>`;
    setTimeout(()=>{document.getElementById('ok-i').innerHTML='';},3000);
    cache=null;cargar();
  }catch(e){document.getElementById('ok-i').innerHTML=`<div class="alerta danger">Error: ${e.message}</div>`;}
}

async function guardarPagoDeuda(){
  const deuda=document.getElementById('qd-deuda').value;
  const monto=parseInt(document.getElementById('qd-monto').value)||0;
  if(!monto){alert('Escribe el monto');return;}
  const fi=document.getElementById('qd-fecha').value;
  const fecha=fmtFechaInput(fi);
  const partes=fecha.split('/');
  document.getElementById('ok-d').innerHTML=`<div class="ok-msg">Guardando...</div>`;
  try{
    await sb('gastos','POST',{fecha,detalle:'Pago deuda: '+deuda,categoria:'Pago Deuda',monto,quien:'Ambos',tarjeta:document.getElementById('qd-cuenta').value,mes:parseInt(partes[1]),anno:parseInt(partes[2])});
    document.getElementById('qd-monto').value='';
    document.getElementById('ok-d').innerHTML=`<div class="ok-msg">Pago de $${fmt(monto)} registrado.</div>`;
    setTimeout(()=>{document.getElementById('ok-d').innerHTML='';},3000);
    cache=null;
  }catch(e){document.getElementById('ok-d').innerHTML=`<div class="alerta danger">Error: ${e.message}</div>`;}
}

async function pagarTar(id,nombre,monto,gastMes,cuotaMes){
  if(!confirm(`Registrar pago de $${fmt(monto)} a ${nombre}?`))return;
  const tars=getTarjetas();const t=tars.find(x=>x.id===id);
  if(t){if(cuotaMes>0)t.saldoDeuda=Math.max(0,t.saldoDeuda-cuotaMes);else t.saldoDeuda=0;if(t.saldoDeuda===0)t.cuotaMes=0;saveTarjetas(tars);}
  const fecha=fmtFechaInput('');const partes=fecha.split('/');
  try{
    await sb('pagos_tarjeta','POST',{fecha,tarjeta:nombre,monto,mes:parseInt(partes[1]),anno:parseInt(partes[2])});
    cache=null;cargar();
  }catch(e){alert('Error: '+e.message);}
}

async function editCta(nombre,actual){
  const v=prompt(`${nombre}\nActual: $${fmt(actual)}\nNuevo saldo:`);if(!v)return;
  const m=parseInt(v.replace(/\./g,'').replace(/,/g,''));if(isNaN(m)||m<0)return;
  try{
    const existing=await sb('cuentas','GET',null,`?cuenta=eq.${encodeURIComponent(nombre)}`);
    if(existing.length>0){
      await sb('cuentas','PATCH',{saldo:m,actualizado:fmtFechaInput('')},`?cuenta=eq.${encodeURIComponent(nombre)}`);
    }else{
      await sb('cuentas','POST',{cuenta:nombre,saldo:m,actualizado:fmtFechaInput('')});
    }
    cache=null;cargar();
  }catch(e){alert('Error: '+e.message);}
}

async function delG(id){
  if(!confirm('Borrar?'))return;
  try{
    // Obtener el gasto antes de borrar para revertir cuentas
    const g=await sb('gastos','GET',null,`?id=eq.${id}`);
    if(g.length>0){
      const gasto=g[0];
      const tar=gasto.tarjeta, cat=gasto.categoria, monto=Number(gasto.monto);
      // Revertir movimientos de cuenta
      if(cat==='Contribucion' && (tar==='Debito Yurby'||tar==='Debito Juan')){
        // Era abono a RUT - revertir: suma de vuelta al debito y quita del RUT
        await actualizarCuenta('RUT Yurby (Contribucion)', -monto);
      }
    }
    await sb('gastos','DELETE',null,`?id=eq.${id}`);
    cache=null;cargar();
  }catch(e){alert('Error al borrar');}
}
async function delI(id){
  if(!confirm('Borrar?'))return;
  try{
    const ing=await sb('ingresos','GET',null,`?id=eq.${id}`);
    if(ing.length>0){
      const ingreso=ing[0];
      // Determinar cuenta: usar campo cuenta si existe, sino inferir de quien
      let cuentaNom=ingreso.cuenta;
      if(!cuentaNom){
        if(ingreso.quien==='Juan') cuentaNom='Debito Juan';
        else if(ingreso.quien==='Yurby') cuentaNom='Debito Yurby';
        else cuentaNom='Debito Yurby';
      }
      await actualizarCuenta(cuentaNom, -Number(ingreso.monto));
    }
    await sb('ingresos','DELETE',null,`?id=eq.${id}`);
    cache=null;cargar();
  }catch(e){console.error(e);alert('Error al borrar: '+e.message);}
}

function toggleCuotas(){
  const tar=document.getElementById('q-tar').value;
  const es=tar.toLowerCase().includes('credito');
  document.getElementById('cuotas-box').style.display=es?'block':'none';
  if(!es)document.getElementById('ciclo-aviso').style.display='none';
}
function calcPreview(){
  const monto=parseInt(document.getElementById('q-monto').value)||0;
  const nc=parseInt(document.getElementById('q-cuotas').value)||1;
  if(!monto||nc<=1){document.getElementById('cuotas-preview').innerHTML='';return;}
  const cuota=Math.round(monto/nc);
  document.getElementById('cuotas-preview').innerHTML=`<strong>${nc} cuotas de $${fmt(cuota)}/mes</strong>`;
}

function editarTarjeta(id){
  const tars=getTarjetas();const t=tars.find(x=>x.id===id);if(!t)return;
  const c=prompt(`Cupo actual: $${fmt(t.cupo)}\nNuevo cupo:`);
  const s=prompt(`Saldo deuda: $${fmt(t.saldoDeuda)}\nNuevo saldo:`);
  const q=prompt(`Cuota fija: $${fmt(t.cuotaMes)}\nNueva cuota:`);
  if(c&&c.trim()){const v=parseInt(c.replace(/\./g,''));if(v>0)t.cupo=v;}
  if(s&&s.trim()){const v=parseInt(s.replace(/\./g,''));if(!isNaN(v)&&v>=0)t.saldoDeuda=v;}
  if(q&&q.trim()){const v=parseInt(q.replace(/\./g,''));if(!isNaN(v)&&v>=0)t.cuotaMes=v;}
  saveTarjetas(tars);cache=null;cargar();
}
function eliminarTarjeta(id){if(!confirm('Eliminar?'))return;saveTarjetas(getTarjetas().filter(t=>t.id!==id));cache=null;cargar();}
function agregarTarjeta(){
  const nom=prompt('Nombre:');if(!nom)return;
  const titular=prompt('Titular:');
  const cupo=parseInt(prompt('Cupo:')||'0');
  const cierre=parseInt(prompt('Dia cierre:')||'25');
  const pago=parseInt(prompt('Dia pago:')||'10');
  const saldo=parseInt(prompt('Saldo actual:')||'0');
  if(!cupo)return;
  const tars=getTarjetas();
  tars.push({id:'t'+Date.now(),nombre:nom,titular:titular||'Yurby',cierre,pago,cupo,saldoDeuda:saldo,cuotaMes:0,deudaLabel:'Saldo en tarjeta'});
  saveTarjetas(tars);cache=null;cargar();
}

function agregarDeuda(){
  const nom=prompt('Nombre:');if(!nom)return;
  const cuota=parseInt(prompt('Cuota mensual:')||'0');
  const total=parseInt(prompt('Total adeudado:')||'0');
  const fin=prompt('Fecha fin (ej: Dic 2027):');
  if(!cuota)return;
  const{fijas,extra}=getDeudas();
  extra.push({id:'d'+Date.now(),nombre:nom,cuota,total,fin:fin||'Por definir',color:'amber',prog:10});
  saveDeudas({fijas,extra});rDeudas();
}
function editDeuda(idx){
  const{fijas,extra}=getDeudas();const d=extra[idx];if(!d)return;
  const c=prompt(`Cuota: $${fmt(d.cuota)}\nNueva:`);
  if(c){const v=parseInt(c.replace(/\./g,''));if(v>0)d.cuota=v;}
  saveDeudas({fijas,extra});rDeudas();
}
function eliminarDeuda(idx){if(!confirm('Eliminar?'))return;const{fijas,extra}=getDeudas();extra.splice(idx,1);saveDeudas({fijas,extra});rDeudas();}

function editMeta(id){
  const metas=getMetas();const m=metas.find(x=>x.id===id);if(!m)return;
  const lab=prompt(`Nombre: ${m.label}\nNuevo:`);
  const met=prompt(`Meta: $${fmt(m.meta)}\nNueva:`);
  if(lab&&lab.trim())m.label=lab;
  if(met&&met.trim()){const v=parseInt(met.replace(/\./g,''));if(v>0)m.meta=v;}
  saveMetas(metas);rMetas();
}
function marcarCumplida(id){if(!confirm('Marcar cumplida?'))return;const metas=getMetas();const m=metas.find(x=>x.id===id);if(m){m.cumplida=true;saveMetas(metas);rMetas();}}
function deshacerCumplida(id){const metas=getMetas();const m=metas.find(x=>x.id===id);if(m){m.cumplida=false;saveMetas(metas);rMetas();}}
function nuevaMeta(){
  const lab=prompt('Nombre:');if(!lab)return;
  const met=parseInt(prompt('Monto:')||'0');
  const emoji=prompt('Emoji:')||'🎯';
  if(!met)return;
  const metas=getMetas();
  metas.push({id:'m'+Date.now(),label:lab,emoji,meta:met,cumplida:false,orden:metas.reduce((a,m)=>Math.max(a,m.orden),0)+1});
  saveMetas(metas);rMetas();
}

function iniciarFechas(){
  const hoy=new Date();
  const yyyy=hoy.getFullYear();
  const mm=String(hoy.getMonth()+1).padStart(2,'0');
  const dd=String(hoy.getDate()).padStart(2,'0');
  const fechaHoy=`${yyyy}-${mm}-${dd}`;
  ['q-fecha','qi-fecha','qd-fecha'].forEach(id=>{const e=document.getElementById(id);if(e&&!e.value)e.value=fechaHoy;});
}

labels();cargar();iniciarFechas();
